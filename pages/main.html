<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/styles-main.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>Buenos días 👋</h1>
                <p>Sergio · Hoy toca entrenar</p>
            </div>
            <div class="avatar">
                S
            </div>
        </div>
        <div class="hero">
            <small>CONTINUAR ENTRENAMIENTO</small>
            <h2>💪 Pecho y Tríceps</h2>
            <div class="progress">
                <div></div>
            </div>
            <div class="hero-info">
                <span>70%</span>
                <span>4 ejercicios · 25 min</span>
            </div>
            <button>▶ Continuar</button>
        </div>
        <div class="stats">

            <div class="stat">
                🔥
                <h2>0</h2>
                <p>días seguidos</p>
            </div>

            <div class="stat">
                🏋️
                <h2>0</h2>
                <p>rutinas</p>
            </div>

            <div class="stat">
                ⏱️
                <h2>0h</h2>
                <p>este mes</p>
            </div>

            <div class="stat">
                ⭐
                <h2>0</h2>
                <p>nivel</p>
            </div>

        </div>

        <div class="section">

            <h3>Tus rutinas</h3>

            <span style="color:#84ff52;">Ver todas</span>

        </div>

    </div>

    <div class="fab">+</div>

    <div class="nav">

        <div class="active">
            🏠<br>Inicio
        </div>

        <div>
            💪<br>Rutinas
        </div>

        <div>
            📊<br>Progreso
        </div>

        <div>
            👤<br>Perfil
        </div>

    </div>

</body>

</html>
